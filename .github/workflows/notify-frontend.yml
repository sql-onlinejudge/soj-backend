name: Notify Frontend
on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Send to frontend
        env:
          GH_TOKEN: ${{ secrets.FRONTEND_DISPATCH_TOKEN }}
        run: |
          DIFF=$(git diff HEAD~1 HEAD)
          MSG=$(git log -1 --pretty=%B)
          curl -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/sql-onlinejudge/soj-frontend/dispatches \
            -d "$(jq -n --arg diff "$DIFF" --arg msg "$MSG" \
              '{event_type: "backend-updated", client_payload: {diff: $diff, commit_message: $msg}}')"